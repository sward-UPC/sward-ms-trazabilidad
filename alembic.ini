# Configuración de Alembic para sward-ms-trazabilidad.
# La URL de la BD NO se hardcodea aquí: env.py la lee de `settings.database_url`
# (asyncpg), de modo que dev/prod usan la misma fuente que la app.
[alembic]
script_location = migrations
prepend_sys_path = .
# Cada microservicio gestiona SOLO sus tablas y su propia tabla de versión
# (alembic_version_trazabilidad), para convivir con la BD compartida de dev.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
