name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements-dev.txt
      - name: Instalar sward-shared
        run: pip install "sward-shared @ git+https://github.com/sward-UPC/sward-shared.git@main"
      - name: Instalar dependencias del servicio
        run: pip install -r requirements.txt
      - name: Lint con ruff
        run: ruff check src/ tests/ && ruff format --check src/ tests/
      - name: Análisis estático de seguridad (bandit)
        run: bandit -r src/ --severity-level medium
      - name: Auditoría de dependencias (pip-audit)
        run: pip-audit || true
      - name: Ejecutar tests unitarios
        run: pytest tests/unit/ -v --cov=src --cov-report=term-missing
