name: Build & Push to GHCR

on:
  push:
    branches:
      - deploy

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements-dev.txt

      - name: Instalar sward-shared
        run: pip install "sward-shared @ git+https://github.com/sward-UPC/sward-shared.git@main"

      - name: Instalar dependencias del servicio
        run: pip install -r requirements.txt

      - name: Lint con ruff
        run: ruff check . && ruff format --check .

      - name: Ejecutar tests unitarios
        run: pytest tests/ -q

      - name: Generar timestamp
        id: timestamp
        run: echo "ts=$(date -u +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/sward-UPC/sward-ms-trazabilidad:${{ steps.timestamp.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
